<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
<style>
:root{
  --ground:#0A0E13; --surface:#10161E; --raised:#172230; --hair:#233042;
  --ink:#E4EAF0; --muted:#8B9BAC; --faint:#5A6C7E;
  --amber:#FFB020; --cyan:#35D0E6; --phos:#46E39B; --alert:#FF6B5E;
  --accent:var(--cyan);
  --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
@media(prefers-color-scheme:light){:root{
  --ground:#DCE2E4; --surface:#F1F4F5; --raised:#FFFFFF; --hair:#C3CDD2;
  --ink:#111A20; --muted:#4B5B67; --faint:#7F919C;
  --amber:#B76E00; --cyan:#0A7C8C; --phos:#0F8F57; --alert:#C0392B;
}}
:root[data-theme="dark"]{--ground:#0A0E13;--surface:#10161E;--raised:#172230;--hair:#233042;--ink:#E4EAF0;--muted:#8B9BAC;--faint:#5A6C7E;--amber:#FFB020;--cyan:#35D0E6;--phos:#46E39B}
:root[data-theme="light"]{--ground:#DCE2E4;--surface:#F1F4F5;--raised:#FFFFFF;--hair:#C3CDD2;--ink:#111A20;--muted:#4B5B67;--faint:#7F919C;--amber:#B76E00;--cyan:#0A7C8C;--phos:#0F8F57}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--ground);color:var(--ink);line-height:1.65;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:inherit}
.site-nav{position:sticky;top:0;z-index:200;background:color-mix(in srgb,var(--ground) 84%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--hair)}
.nav-inner{display:flex;justify-content:space-between;align-items:center;max-width:1280px;margin:0 auto;padding:.7rem 1.6rem}
.nav-logo{font-family:var(--mono);font-weight:600;font-size:1.1rem;color:var(--ink);text-decoration:none;letter-spacing:.02em;display:flex;align-items:center;gap:.5rem}
.nav-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--phos);box-shadow:0 0 9px var(--phos)}
.nav-logo span{color:var(--faint)}
.nav-links{display:flex;list-style:none;gap:1.3rem;align-items:center}
.nav-links a{color:var(--muted);text-decoration:none;font-size:.85rem;font-family:var(--mono);letter-spacing:.02em;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--accent)}
.nav-cta{border:1px solid var(--accent);color:var(--accent)!important;padding:.4rem 1rem;border-radius:4px;text-transform:uppercase;font-size:.75rem!important}
.nav-cta:hover{background:var(--accent);color:var(--ground)!important}
.menu-toggle{display:none;background:none;border:1px solid var(--hair);color:var(--accent);border-radius:5px;padding:.3rem .6rem;cursor:pointer;font-family:var(--mono);font-size:.9rem}
@media(max-width:900px){.nav-links{display:none}.menu-toggle{display:inline-block}}
.docs-shell{display:grid;grid-template-columns:290px minmax(0,1fr);max-width:1280px;margin:0 auto;position:relative}
.sidebar-backdrop{display:none;position:fixed;inset:56px 0 0 0;z-index:140;background:rgba(0,0,0,.5)}
.docs-sidebar{position:sticky;top:56px;align-self:start;height:calc(100vh - 56px);overflow-y:auto;padding:1.5rem 1rem 3rem;border-right:1px solid var(--hair)}
.sidebar-title{font-family:var(--mono);font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin:.4rem .5rem 1rem;display:flex;align-items:center;gap:.4rem}
.doc-nav{list-style:none;display:flex;flex-direction:column;gap:.15rem}
.doc-nav a{display:block;text-decoration:none;color:var(--muted);font-size:.85rem;line-height:1.35;padding:.5rem .65rem;border-radius:6px;border-left:2px solid transparent;transition:.15s}
.doc-nav a:hover{background:color-mix(in srgb,var(--accent) 8%,transparent);color:var(--ink)}
.doc-nav a.active{background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--ink);border-left-color:var(--accent)}
.doc-nav a .doc-file{display:block;font-family:var(--mono);font-size:.66rem;color:var(--faint);margin-top:.15rem}
.sidebar-src{margin:1.4rem .5rem 0;padding-top:1rem;border-top:1px solid var(--hair);font-size:.72rem;color:var(--muted)}
.sidebar-src a{color:var(--accent);text-decoration:none}
.src-status{font-family:var(--mono);font-size:.64rem;color:var(--faint);margin-top:.4rem}
.docs-main{padding:1.6rem 2.5rem 5rem;min-width:0}
.doc-back{display:inline-flex;align-items:center;gap:.4rem;font-size:.82rem;color:var(--muted);text-decoration:none;margin-bottom:1.2rem;font-family:var(--mono)}
.doc-back:hover{color:var(--accent)}
.doc-toolbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--hair)}
.doc-path{font-family:var(--mono);font-size:.74rem;color:var(--faint)}
.doc-path a{color:var(--accent);text-decoration:none}
.doc-actions{display:flex;gap:.6rem}
.doc-actions a{font-family:var(--mono);font-size:.72rem;text-decoration:none;color:var(--muted);border:1px solid var(--hair);padding:.3rem .7rem;border-radius:5px;transition:.2s}
.doc-actions a:hover{color:var(--accent);border-color:var(--accent)}
.markdown-body{font-size:.96rem;line-height:1.75}
.markdown-body>*:first-child{margin-top:0}
.markdown-body h1,.markdown-body h2,.markdown-body h3,.markdown-body h4,.markdown-body h5,.markdown-body h6{line-height:1.25;font-weight:750;scroll-margin-top:72px;margin:2rem 0 1rem;text-wrap:balance}
.markdown-body h1{font-size:2rem;margin-top:0;color:var(--ink);letter-spacing:-.02em}
.markdown-body h1::after{content:"";display:block;width:56px;height:2px;background:var(--cyan);margin-top:.6rem}
.markdown-body h2{font-size:1.45rem;color:var(--ink);border-bottom:1px solid var(--hair);padding-bottom:.35rem;letter-spacing:-.01em}
.markdown-body h3{font-size:1.18rem;color:var(--cyan)}
.markdown-body h4{font-size:1rem;color:var(--amber);font-family:var(--mono)}
.markdown-body a{color:var(--cyan);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--cyan) 35%,transparent)}
.markdown-body a:hover{color:var(--amber);border-bottom-color:var(--amber)}
.markdown-body p,.markdown-body ul,.markdown-body ol,.markdown-body blockquote{margin-bottom:1rem}
.markdown-body ul,.markdown-body ol{padding-left:1.5rem}
.markdown-body li{margin-bottom:.35rem}
.markdown-body li::marker{color:var(--cyan)}
.markdown-body strong{color:var(--ink)}
.markdown-body em{color:var(--amber);font-style:normal}
.markdown-body blockquote{border-left:3px solid var(--cyan);background:color-mix(in srgb,var(--cyan) 5%,transparent);padding:.6rem 1rem;border-radius:0 6px 6px 0;color:var(--muted)}
.markdown-body hr{border:none;border-top:1px solid var(--hair);margin:2rem 0}
.markdown-body :not(pre)>code{font-family:var(--mono);font-size:.84em;background:var(--raised);color:var(--amber);padding:.12rem .4rem;border-radius:4px;border:1px solid var(--hair)}
.markdown-body pre{background:#05080C!important;border:1px solid var(--hair);border-radius:10px;padding:1.1rem 1.25rem;overflow-x:auto;margin-bottom:1.25rem}
.markdown-body pre code{font-family:var(--mono);font-size:.82rem;line-height:1.6;background:none!important;padding:0;border:none}
.markdown-body table{border-collapse:collapse;width:100%;margin-bottom:1.25rem;font-size:.86rem;display:block;overflow-x:auto}
.markdown-body th,.markdown-body td{border:1px solid var(--hair);padding:.5rem .8rem;text-align:left}
.markdown-body th{background:color-mix(in srgb,var(--cyan) 8%,transparent);color:var(--cyan);font-family:var(--mono);font-size:.76rem;letter-spacing:.03em}
.markdown-body tr:nth-child(even) td{background:color-mix(in srgb,var(--ink) 3%,transparent)}
.markdown-body img{max-width:100%;border-radius:8px}
.markdown-body .mermaid{background:var(--surface);border:1px solid var(--hair);border-radius:10px;padding:1.25rem;margin-bottom:1.25rem;text-align:center;overflow-x:auto}
.doc-status{padding:3rem 1rem;text-align:center;color:var(--muted);font-family:var(--mono);font-size:.9rem}
.doc-status .spinner{display:inline-block;width:1.3rem;height:1.3rem;margin-right:.6rem;border:2px solid color-mix(in srgb,var(--cyan) 30%,transparent);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.doc-error{color:var(--alert)}
.site-footer{padding:2rem 0;border-top:1px solid var(--hair);background:var(--surface);margin-top:2rem}
.footer-copy{font-family:var(--mono);font-size:.76rem;color:var(--faint);text-align:center}
.footer-copy span{color:var(--cyan)}
.footer-copy a{color:var(--muted);text-decoration:none}
.footer-copy a:hover{color:var(--accent)}
@media(max-width:900px){
  .docs-shell{grid-template-columns:1fr}
  .docs-sidebar{position:fixed;top:56px;left:0;z-index:150;width:82%;max-width:320px;background:var(--ground);border-right:1px solid var(--hair);transform:translateX(-102%);transition:transform .25s ease}
  .docs-sidebar.open{transform:translateX(0)}
  .docs-main{padding:1.25rem 1.1rem 4rem}
  .sidebar-backdrop.show{display:block}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto}}
</style>

<body>
<nav class="site-nav" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <a href="/" class="nav-logo"><span class="dot"></span>skcot <span>// docs</span></a>

</nav>

<div class="docs-shell">
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

</div>

<footer class="site-footer">
  <p class="footer-copy">
    &copy; 2026 <span>smilinTux</span> · part of the SK ecosystem · docs rendered live from

  </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js"></script>
<script>
(function(){
  "use strict";
  /* CONFIG: adopting a site = set REPO (+ BRANCH if not main). */
  const REPO="smilinTux/skcot", BRANCH="main", DOCS_PATH="docs", DEFAULT_DOC="README.md", SITE_LABEL="skcot";
  const API_LIST=`https://api.github.com/repos/${REPO}/contents/${DOCS_PATH}`;
  const RAW_BASE=`https://raw.githubusercontent.com/${REPO}/${BRANCH}/${DOCS_PATH}/`;
  const HTML_BASE=`https://github.com/${REPO}/blob/${BRANCH}/${DOCS_PATH}/`;
  const TREE_URL=`https://github.com/${REPO}/tree/${BRANCH}/${DOCS_PATH}`;
  const REPO_URL=`https://github.com/${REPO}`, MANIFEST="docs-manifest.json";
  const els={nav:document.getElementById("docNav"),content:document.getElementById("docContent"),path:document.getElementById("docPath"),actions:document.getElementById("docActions"),srcStatus:document.getElementById("srcStatus"),srcLink:document.getElementById("srcLink"),footerRepo:document.getElementById("footerRepo"),sidebar:document.getElementById("docsSidebar"),backdrop:document.getElementById("sidebarBackdrop"),toggle:document.getElementById("menuToggle")};
  if(els.srcLink){els.srcLink.href=TREE_URL;els.srcLink.textContent=`${REPO} · ${DOCS_PATH}/`;}
  if(els.footerRepo){els.footerRepo.href=REPO_URL;els.footerRepo.textContent=`github.com/${REPO}`;}
  let DOCS=[];
  if(window.mermaid){mermaid.initialize({startOnLoad:false,theme:"dark",securityLevel:"strict",themeVariables:{primaryColor:"#10161E",primaryTextColor:"#E4EAF0",primaryBorderColor:"#35D0E6",lineColor:"#FFB020",fontFamily:"ui-monospace, monospace"}});}
  if(window.marked){marked.setOptions({gfm:true,breaks:false});}
  function prettify(n){return n.replace(/\.mdx?$/i,"").replace(/[_-]+/g," ").replace(/\b\w/g,c=>c.toUpperCase());}
  function slugify(t){return String(t).toLowerCase().trim().replace(/[^\w\s-]/g,"").replace(/[\s_]+/g,"-").replace(/-+/g,"-");}
  function getParam(){const p=new URLSearchParams(location.search).get("doc");return p&&/^[\w.-]+\.mdx?$/i.test(p)?p:null;}
  async function loadIndex(){
    try{
      const res=await fetch(API_LIST,{headers:{"Accept":"application/vnd.github+json"}});
      if(!res.ok)throw new Error("API "+res.status);
      const data=await res.json();
      DOCS=data.filter(x=>x.type==="file"&&/\.mdx?$/i.test(x.name)).map(x=>({name:x.name,title:prettify(x.name)}));
      await mergeManifestTitles();
      setSrcStatus("live · GitHub API");
    }catch(err){
      try{const res=await fetch(MANIFEST,{cache:"no-cache"});const man=await res.json();DOCS=man.docs.map(d=>({name:d.name,title:d.title||prettify(d.name)}));setSrcStatus("fallback · committed manifest");}
      catch(e2){els.nav.innerHTML='<li class="doc-status doc-error">Could not load the doc index.</li>';setSrcStatus("offline");return;}
    }
    renderNav();
    if(DOCS.length&&!DOCS.some(d=>d.name===currentDoc))renderDoc(DOCS[0].name);
  }
  async function mergeManifestTitles(){
    try{
      const res=await fetch(MANIFEST,{cache:"no-cache"});if(!res.ok)return;
      const man=await res.json();const byName={};(man.docs||[]).forEach(d=>{byName[d.name]=d.title;});
      const ordered=[];(man.docs||[]).forEach(d=>{const hit=DOCS.find(x=>x.name===d.name);if(hit){hit.title=d.title||hit.title;ordered.push(hit);}});
      DOCS.forEach(x=>{if(!ordered.includes(x))ordered.push(x);});DOCS=ordered;
      DOCS.forEach(x=>{if(byName[x.name])x.title=byName[x.name];});
    }catch(_){}
  }
  function setSrcStatus(t){els.srcStatus.textContent=t;}
  function renderNav(){
    els.nav.innerHTML="";
    DOCS.forEach(doc=>{
      const li=document.createElement("li"),a=document.createElement("a");
      a.href="?doc="+encodeURIComponent(doc.name);a.dataset.doc=doc.name;
      const t=document.createElement("span");t.textContent=doc.title;
      const f=document.createElement("span");f.className="doc-file";f.textContent=doc.name;
      a.appendChild(t);a.appendChild(f);
      a.addEventListener("click",e=>{e.preventDefault();navigateTo(doc.name);closeSidebar();});
      li.appendChild(a);els.nav.appendChild(li);
    });
    highlightActive(currentDoc);
  }
  function highlightActive(name){els.nav.querySelectorAll("a").forEach(a=>a.classList.toggle("active",a.dataset.doc===name));}
  let currentDoc=null;
  async function renderDoc(name){
    currentDoc=name;highlightActive(name);updateToolbar(name);
    document.title=prettify(name)+" · "+SITE_LABEL+" docs";
    els.content.innerHTML='<div class="doc-status"><span class="spinner"></span>Loading document</div>';
    let md;
    try{const res=await fetch(RAW_BASE+name,{cache:"no-cache"});if(!res.ok)throw new Error("HTTP "+res.status);md=await res.text();}
    catch(err){els.content.innerHTML='<div class="doc-status doc-error">Failed to load <code>'+name+'</code> ('+(err.message||"error")+').<br>Try the <a href="'+HTML_BASE+name+'" target="_blank" rel="noopener">source on GitHub</a>.</div>';return;}
    const rawHtml=marked.parse(md);
    els.content.innerHTML=DOMPurify.sanitize(rawHtml,{ADD_ATTR:["target"]});
    const seen={};
    els.content.querySelectorAll("h1,h2,h3,h4,h5,h6").forEach(h=>{if(h.id)return;let s=slugify(h.textContent)||"section";if(seen[s]!=null){seen[s]++;s=s+"-"+seen[s];}else seen[s]=0;h.id=s;});
    const mm=[];
    els.content.querySelectorAll("code.language-mermaid,code.lang-mermaid").forEach(code=>{const d=document.createElement("div");d.className="mermaid";d.textContent=code.textContent;(code.closest("pre")||code).replaceWith(d);mm.push(d);});
    if(mm.length&&window.mermaid){try{await mermaid.run({nodes:mm});}catch(e){}}
    els.content.querySelectorAll("pre code").forEach(b=>{if(b.classList.contains("language-mermaid"))return;try{hljs.highlightElement(b);}catch(_){}});
    els.content.querySelectorAll('a[href^="http"]').forEach(a=>{a.target="_blank";a.rel="noopener";});
    if(location.hash){const t=document.getElementById(location.hash.slice(1));t?t.scrollIntoView():window.scrollTo(0,0);}else window.scrollTo(0,0);
  }
  function updateToolbar(name){
    els.path.innerHTML=DOCS_PATH+' / <a href="'+HTML_BASE+name+'" target="_blank" rel="noopener">'+name+"</a>";
    els.actions.innerHTML='<a href="'+RAW_BASE+name+'" target="_blank" rel="noopener">Raw</a><a href="'+HTML_BASE+name+'" target="_blank" rel="noopener">GitHub ↗</a>';
  }
  function navigateTo(name,hash){history.pushState({doc:name},"","?doc="+encodeURIComponent(name)+(hash||""));renderDoc(name);}
  window.addEventListener("popstate",()=>renderDoc(getParam()||DEFAULT_DOC));
  function openSidebar(){els.sidebar.classList.add("open");els.backdrop.classList.add("show");}
  function closeSidebar(){els.sidebar.classList.remove("open");els.backdrop.classList.remove("show");}
  els.toggle.addEventListener("click",()=>els.sidebar.classList.contains("open")?closeSidebar():openSidebar());
  els.backdrop.addEventListener("click",closeSidebar);
  const initialDoc=getParam()||DEFAULT_DOC;currentDoc=initialDoc;loadIndex();renderDoc(initialDoc);
})();
</script>
</body>
